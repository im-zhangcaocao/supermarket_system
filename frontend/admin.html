<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家电超市 - 管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background-color: #f0f4f8;
            color: #1e2a3a;
        }

        .admin-container {
            display: flex;
            min-height: 100vh;
        }

        /* 侧边栏 */
        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #0a3d62 0%, #1e5a7a 100%);
            color: white;
            display: flex;
            flex-direction: column;
        }

        .logo-area {
            padding: 24px 20px;
            font-size: 1.4rem;
            font-weight: 600;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-menu {
            flex: 1;
            padding-top: 20px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 20px;
            color: #e0e7ff;
            text-decoration: none;
            margin: 4px 12px;
            border-radius: 8px;
            transition: 0.2s;
        }

        .nav-item.active {
            background-color: rgba(255, 255, 255, 0.15);
            color: white;
        }

        .user-info-sidebar {
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            background: white;
            padding: 16px 28px;
            border-bottom: 1px solid #e2e8f0;
        }

        .content-wrapper {
            padding: 24px 28px;
            background-color: #f8fafc;
            flex: 1;
        }

        /* 卡片样式 */
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            padding: 20px;
            margin-bottom: 24px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            border-bottom: 1px solid #eef2f6;
            padding-bottom: 12px;
        }

        .card-header h3 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #1e4663;
        }

        /* 表格 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th, .data-table td {
            text-align: left;
            padding: 12px 8px;
            border-bottom: 1px solid #edf2f7;
        }

        .data-table th {
            background-color: #f8fafc;
            font-weight: 600;
            color: #2c5282;
        }

        /* 表单 */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #2d3748;
        }

        .form-group input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 0.95rem;
        }

        .btn {
            background-color: #3182ce;
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-secondary {
            background-color: #e2e8f0;
            color: #2d3748;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="logo-area">
                <span>🏪</span>
                <span>家电超市管理</span>
            </div>
            <nav class="nav-menu">
                <div class="nav-item active">
                    <span>📦</span> <span>库存管理</span>
                </div>
                <div class="nav-item">
                    <span>🛒</span> <span>销售管理</span>
                </div>
                <div class="nav-item">
                    <span>🚚</span> <span>采购管理</span>
                </div>
                <div class="nav-item">
                    <span>👥</span> <span>用户管理</span>
                </div>
                <div class="nav-item">
                    <span>📈</span> <span>财务管理</span>
                </div>
                <div class="nav-item">
                    <span>📄</span> <span>统计报表</span>
                </div>
            </nav>
            <div class="user-info-sidebar">
                <span>👤</span> <span>管理员</span>
                <span style="margin-left: auto;">🚪</span>
            </div>
        </aside>

        <!-- 主内容区（库存管理模块示例） -->
        <main class="main-content">
            <header class="top-bar">
                <div class="page-title"><h2>库存管理</h2></div>
            </header>
            <div class="content-wrapper">
                <!-- 产品列表卡片 -->
                <div class="card">
                    <div class="card-header">
                        <h3>产品列表</h3>
                        <button class="btn">刷新</button>
                    </div>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>名称</th>
                                <th>价格</th>
                                <th>库存</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>1</td>
                                <td>智能冰箱</td>
                                <td>¥2999</td>
                                <td>10</td>
                                <td><button class="btn-secondary">编辑</button> <button class="btn-secondary">禁用</button></td>
                            </tr>
                            <tr>
                                <td>2</td>
                                <td>滚筒洗衣机</td>
                                <td>¥1999</td>
                                <td>5</td>
                                <td><button class="btn-secondary">编辑</button> <button class="btn-secondary">禁用</button></td>
                            </tr>
                            <tr>
                                <td>3</td>
                                <td>变频空调</td>
                                <td>¥3499</td>
                                <td>8</td>
                                <td><button class="btn-secondary">编辑</button> <button class="btn-secondary">禁用</button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <!-- 添加新产品卡片 -->
                <div class="card">
                    <div class="card-header"><h3>添加新产品</h3></div>
                    <form>
                        <div class="form-group">
                            <label>产品名称</label>
                            <input type="text" placeholder="请输入产品名称">
                        </div>
                        <div class="form-group">
                            <label>价格</label>
                            <input type="number" step="0.01" placeholder="请输入价格">
                        </div>
                        <div class="form-group">
                            <label>库存</label>
                            <input type="number" placeholder="请输入初始库存">
                        </div>
                        <button type="submit" class="btn">添加产品</button>
                    </form>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
